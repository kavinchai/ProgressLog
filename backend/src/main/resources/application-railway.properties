# ── Logging (Railway) ─────────────────────────────────────────────────────────
# Application code — DEBUG shows all controller/service/repo calls
logging.level.com.kavin.fitness=DEBUG

# SQL — show every query and its parameters
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Flyway — show each migration as it runs
logging.level.org.flywaydb=DEBUG

# Spring Security — show filter chain decisions and auth events
logging.level.org.springframework.security=DEBUG

# Spring Web — show request mapping and handler resolution
logging.level.org.springframework.web=DEBUG

# Connection pool (HikariCP) — show pool sizing and checkout times
logging.level.com.zaxxer.hikari=DEBUG

# Log format: plain text works best in Railway's log viewer (no ANSI colour codes)
spring.output.ansi.enabled=never
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
