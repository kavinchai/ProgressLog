# QAF Configuration
env.baseurl=http://localhost:5173
env.resources=src/main/resources

# WebDriver configuration
driver.name=chromeDriver
driver.additional.capabilities={"goog:chromeOptions":{"args":["--headless","--no-sandbox","--disable-dev-shm-usage","--window-size=1920,1080"]}}

# Timeouts (milliseconds)
selenium.wait.timeout=10000
selenium.explicit.wait.timeout=10000

# Locator repository
env.default.locale=en

# Reporting
qaf.reports.dir=test-results
