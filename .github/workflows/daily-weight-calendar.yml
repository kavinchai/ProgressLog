name: Daily Weight to Google Calendar

on:
  schedule:
    - cron: '0 5 * * *'  # 5am UTC = midnight US Eastern (EST); 1am during EDT
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Backfill all historical weight data'
        type: boolean
        default: false
      target_date:
        description: 'Date to sync (YYYY-MM-DD). Defaults to yesterday if not set.'
        type: string
        default: ''

jobs:
  post-weight:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          set -x
          python --version
          pip --version
          pip install psycopg2-binary google-api-python-client google-auth
          pip show psycopg2-binary google-api-python-client google-auth | grep -E '^(Name|Version):'

      - name: Post weight to Google Calendar
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.KAVIN_WEIGHT_GOOGLE_CALENDAR_ID }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          BACKFILL: ${{ inputs.backfill || 'false' }}
          TARGET_DATE: ${{ inputs.target_date || '' }}
        run: |
          python - <<'EOF'
          import os
          import sys
          import json
          import traceback
          from datetime import date, timedelta
          from urllib.parse import urlparse

          print("=" * 60)
          print("[startup] python:", sys.version.replace("\n", " "))
          print("[startup] cwd:", os.getcwd())
          print("=" * 60)

          # --- 1. Validate environment variables -----------------------------
          required = [
              'RAILWAY_DATABASE_URL',
              'GOOGLE_SERVICE_ACCOUNT_JSON',
              'GOOGLE_CALENDAR_ID',
              'DB_USERNAME',
          ]
          print("[env] checking required environment variables...")
          missing = []
          for key in required:
              val = os.environ.get(key, '')
              if not val:
                  missing.append(key)
                  print(f"  [env] {key}: MISSING")
              else:
                  print(f"  [env] {key}: present (len={len(val)})")
          if missing:
              print(f"[fatal] missing required env vars: {missing}")
              sys.exit(1)

          backfill = os.environ['BACKFILL'].lower() == 'true'
          target_date_str = os.environ['TARGET_DATE'].strip()
          if target_date_str:
              try:
                  target_date = date.fromisoformat(target_date_str)
              except ValueError as e:
                  print(f"[fatal] TARGET_DATE='{target_date_str}' is not ISO-8601: {e}")
                  sys.exit(1)
          else:
              target_date = date.today() - timedelta(days=1)

          print(f"[config] backfill={backfill}")
          print(f"[config] target_date={target_date}")
          print(f"[config] today={date.today()}")
          print(f"[config] calendar_id={os.environ['GOOGLE_CALENDAR_ID']}")
          print(f"[config] db_username={os.environ['DB_USERNAME']}")

          # --- 2. Connect to Postgres ----------------------------------------
          try:
              import psycopg2
          except Exception:
              print("[fatal] failed to import psycopg2")
              traceback.print_exc()
              sys.exit(1)

          try:
              url = urlparse(os.environ['RAILWAY_DATABASE_URL'])
              print(f"[db] parsed URL: host={url.hostname} port={url.port} db={url.path.lstrip('/')} user={url.username}")
              print("[db] connecting (sslmode=require)...")
              conn = psycopg2.connect(
                  host=url.hostname,
                  port=url.port,
                  database=url.path.lstrip('/'),
                  user=url.username,
                  password=url.password,
                  sslmode='require',
                  connect_timeout=15,
              )
              cur = conn.cursor()
              cur.execute("SELECT version(), current_database(), current_user")
              v = cur.fetchone()
              print(f"[db] connected. server={v[0]!r}")
              print(f"[db] current_database={v[1]} current_user={v[2]}")
          except Exception:
              print("[fatal] database connection failed")
              traceback.print_exc()
              sys.exit(1)

          # --- 3. Look up user ------------------------------------------------
          db_username = os.environ['DB_USERNAME']
          try:
              cur.execute("SELECT id, username FROM users WHERE username = %s", (db_username,))
              user = cur.fetchone()
          except Exception:
              print("[fatal] users lookup query failed")
              traceback.print_exc()
              cur.close(); conn.close()
              sys.exit(1)

          if not user:
              print(f"[fatal] no user found with username '{db_username}'. Listing first 10 known users for debugging:")
              cur.execute("SELECT id, username FROM users ORDER BY id LIMIT 10")
              for u in cur.fetchall():
                  print(f"  → id={u[0]} username={u[1]}")
              cur.close(); conn.close()
              sys.exit(1)
          print(f"[db] found user: id={user[0]}, username={user[1]}")

          # --- 4. Query weight rows ------------------------------------------
          try:
              if backfill:
                  print("[db] running backfill query for all weight entries...")
                  cur.execute("""
                      SELECT wl.log_date, wl.weight_lbs
                      FROM weight_log wl
                      JOIN users u ON u.id = wl.user_id
                      WHERE u.username = %s
                      ORDER BY wl.log_date
                  """, (db_username,))
              else:
                  print(f"[db] querying weight for date: {target_date}")
                  cur.execute("""
                      SELECT wl.log_date, wl.weight_lbs
                      FROM weight_log wl
                      JOIN users u ON u.id = wl.user_id
                      WHERE u.username = %s
                        AND wl.log_date = %s
                  """, (db_username, target_date))
              rows = cur.fetchall()
          except Exception:
              print("[fatal] weight query failed")
              traceback.print_exc()
              cur.close(); conn.close()
              sys.exit(1)

          print(f"[db] rows returned: {len(rows)}")
          for r in rows:
              print(f"  → log_date={r[0]} weight_lbs={r[1]}")
          cur.close()
          conn.close()
          print("[db] connection closed")

          if not rows:
              print("[done] no weight entries found, exiting cleanly.")
              sys.exit(0)

          # --- 5. Authenticate with Google Calendar --------------------------
          try:
              from google.oauth2 import service_account
              from googleapiclient.discovery import build
              from googleapiclient.errors import HttpError
          except Exception:
              print("[fatal] failed to import google libraries")
              traceback.print_exc()
              sys.exit(1)

          try:
              raw_sa = os.environ['GOOGLE_SERVICE_ACCOUNT_JSON']
              print(f"[gcal] service account JSON length: {len(raw_sa)}")
              sa_info = json.loads(raw_sa)
              print(f"[gcal] service account type:         {sa_info.get('type')}")
              print(f"[gcal] service account project_id:   {sa_info.get('project_id')}")
              print(f"[gcal] service account client_email: {sa_info.get('client_email')}")
              print(f"[gcal] service account client_id:    {sa_info.get('client_id')}")
              creds = service_account.Credentials.from_service_account_info(
                  sa_info,
                  scopes=['https://www.googleapis.com/auth/calendar']
              )
              service = build('calendar', 'v3', credentials=creds, cache_discovery=False)
              print("[gcal] discovery client built successfully")
          except Exception:
              print("[fatal] failed to build Google Calendar client")
              traceback.print_exc()
              sys.exit(1)

          calendar_id = os.environ['GOOGLE_CALENDAR_ID']

          # Verify we can actually see the calendar
          try:
              meta = service.calendars().get(calendarId=calendar_id).execute()
              print(f"[gcal] calendar verified: id={meta.get('id')} summary={meta.get('summary')!r} timeZone={meta.get('timeZone')}")
          except HttpError as e:
              print(f"[fatal] cannot access calendar '{calendar_id}': HTTP {e.status_code}")
              print(f"[fatal] response: {e.content!r}")
              print("[hint] make sure the calendar is shared with the service account client_email above with 'Make changes to events' permission.")
              sys.exit(1)
          except Exception:
              print(f"[fatal] cannot access calendar '{calendar_id}'")
              traceback.print_exc()
              sys.exit(1)

          # --- 6. Create events ----------------------------------------------
          def event_exists(log_date):
              day_str = str(log_date)
              result = service.events().list(
                  calendarId=calendar_id,
                  timeMin=f'{day_str}T00:00:00Z',
                  timeMax=f'{day_str}T23:59:59Z',
                  singleEvents=True,
                  q='Weight:'
              ).execute()
              return any(
                  e.get('summary', '').startswith('Weight:')
                  for e in result.get('items', [])
              )

          created_count = 0
          skipped_count = 0
          failed_count = 0
          for log_date, weight_lbs in rows:
              try:
                  if event_exists(log_date):
                      print(f"[skip] event already exists for {log_date}")
                      skipped_count += 1
                      continue
                  weight = float(weight_lbs)
                  event = {
                      'summary': f'Weight: {weight} lbs',
                      'start': {'date': str(log_date)},
                      'end':   {'date': str(log_date)},
                  }
                  print(f"[create] inserting event for {log_date}: {event['summary']}")
                  created = service.events().insert(
                      calendarId=calendar_id,
                      body=event
                  ).execute()
                  print(f"[created] {event['summary']} on {log_date} → {created.get('htmlLink')}")
                  created_count += 1
              except HttpError as e:
                  failed_count += 1
                  print(f"[error] HTTP {e.status_code} processing {log_date}: {e.content!r}")
              except Exception:
                  failed_count += 1
                  print(f"[error] unexpected failure processing {log_date}")
                  traceback.print_exc()

          print("=" * 60)
          print(f"[summary] created={created_count} skipped={skipped_count} failed={failed_count} total_rows={len(rows)}")
          print("=" * 60)
          if failed_count:
              sys.exit(1)
          EOF
